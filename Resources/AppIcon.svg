<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- b5 = b4(트윈 셀+반짝) 기반 + f2 요소 반영: 채움을 액체 물결로, 반짝을 오목한 4점 스파크로 -->
  <defs>
    <linearGradient id="bg5" x1="112" y1="90" x2="910" y2="936" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAF8FF"/><stop offset="1" stop-color="#DED7F3"/>
    </linearGradient>
    <linearGradient id="warm5" x1="222" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2A06F"/><stop offset="1" stop-color="#F6C47B"/>
    </linearGradient>
    <linearGradient id="cool5" x1="222" y1="0" x2="730" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62B8E8"/><stop offset="1" stop-color="#78DBD0"/>
    </linearGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#574B76" flood-opacity=".22"/>
    </filter>
    <filter id="sparkGlow5" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#C89F27" flood-opacity=".28"/>
    </filter>
    <clipPath id="warmClip5"><rect x="238" y="330" width="492" height="156" rx="52"/></clipPath>
    <clipPath id="coolClip5"><rect x="238" y="578" width="492" height="156" rx="52"/></clipPath>
  </defs>
  <rect x="32" y="32" width="960" height="960" rx="232" fill="url(#bg5)" filter="url(#shadow5)"/>
  <rect x="48" y="48" width="928" height="928" rx="216" fill="none" stroke="#FFFFFF" stroke-opacity=".65" stroke-width="8"/>
  <!-- 위 배터리 (웜/Claude) -->
  <rect x="770" y="362" width="60" height="92" rx="28" fill="#493B68"/>
  <rect x="194" y="290" width="600" height="236" rx="82" fill="#F9F7FF" stroke="#493B68" stroke-width="32"/>
  <rect x="238" y="330" width="492" height="156" rx="52" fill="#493B68" fill-opacity=".10"/>
  <!-- 액체 물결 채움 (f2 반영): 끝단이 살짝 굽이치는 파도 -->
  <path d="M238 330 H520 C500 356 546 380 524 408 C506 432 548 458 528 486 H238 Z"
        fill="url(#warm5)" clip-path="url(#warmClip5)"/>
  <!-- 아래 배터리 (쿨/Codex) -->
  <rect x="770" y="610" width="60" height="92" rx="28" fill="#493B68"/>
  <rect x="194" y="538" width="600" height="236" rx="82" fill="#F9F7FF" stroke="#493B68" stroke-width="32"/>
  <rect x="238" y="578" width="492" height="156" rx="52" fill="#493B68" fill-opacity=".10"/>
  <path d="M238 578 H612 C592 604 638 628 616 656 C598 680 640 706 620 734 H238 Z"
        fill="url(#cool5)" clip-path="url(#coolClip5)"/>
  <!-- 하이라이트 -->
  <path d="M282 356H474M282 604H556" stroke="#FFFFFF" stroke-opacity=".45" stroke-width="16" stroke-linecap="round"/>
  <!-- f2식 오목한 4점 스파크 + 작은 방울 -->
  <path d="M790 148 C797 208 823 234 883 242 C823 250 797 276 790 336 C783 276 757 250 697 242 C757 234 783 208 790 148Z"
        fill="#FFD764" stroke="#493B68" stroke-width="18" stroke-linejoin="round" filter="url(#sparkGlow5)"/>
  <circle cx="694" cy="170" r="17" fill="#F2A06F"/>
</svg>
